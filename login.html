<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedHome - Login</title>
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

    <div class="left">
        <img src="img/logo-medhome.png" alt="Logo MedHome">

        <h1>MedHome</h1>

        <p>Seu parceiro em cuidados domiciliar</p>
    </div>

    <div class="right">

        <h2>Bem-vindo!</h2>

        <p class="subtitle">
            Entre com suas credenciais para continuar
        </p>

        <form>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" placeholder="Insira seu endereço de email">
            </div>

            <div class="form-group">
                <label>Senha:</label>
                <input type="password" placeholder="Insira sua senha">
            </div>

            <div class="forgot">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-login">
                Entrar
            </button>

        </form>

        <div class="register">
            Não tem uma conta?
            <a href="#">Cadastre-se</a>
        </div>

    </div>

</div>

</body>
</html>
