<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Paciente - MedHome</title>
<link rel="stylesheet" href="css/cadastropaciente.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Cadastro de Paciente</h1>
        <p>Preencha os dados para cadastro do paciente</p>
    </div>

    <div class="section-title">
        Dados Pessoais
    </div>

    <div class="form-grid">

        <div class="form-group full">
            <label>Nome Completo</label>
            <input type="text" placeholder="Insira seu nome completo">
        </div>

        <div class="form-group">
            <label>CPF</label>
            <input type="text" placeholder="000.000.000-00">
        </div>

        <div class="form-group">
            <label>Data de Nascimento</label>
            <input type="date">
        </div>

        <div class="form-group full">
            <label>Sexo</label>

            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="sexo">
                    Masculino
                </label>

                <label class="radio-item">
                    <input type="radio" name="sexo">
                    Feminino
                </label>
            </div>
        </div>

    </div>

    <div class="section-title">
        Contato
    </div>

    <div class="form-grid">

        <div class="form-group full">
            <label>Telefone</label>
            <input type="tel" placeholder="(85) 99999-9999">
        </div>

        <div class="form-group full">
            <label>Email</label>
            <input type="email" placeholder="exemplo@seudominio.com">
        </div>

        <div class="form-group">
            <label>Endereço</label>
            <input type="text" placeholder="Rua, número">
        </div>

        <div class="form-group">
            <label>Cidade</label>
            <input type="text" placeholder="Nome da cidade">
        </div>

    </div>

    <div class="section-title">
        Informações Médicas
    </div>

    <div class="form-grid">

        <div class="form-group full">
            <label>Número da Carteirinha</label>
            <input type="text" placeholder="Insira o número da carteirinha">
        </div>

        <div class="form-group full">
            <label>Diagnóstico</label>
            <input type="text" placeholder="Insira seu diagnóstico">
        </div>

        <div class="form-group full">
            <label>Observações</label>
            <textarea placeholder="Deixe algumas observações"></textarea>
        </div>

    </div>

    <div class="section-title">
        Segurança
    </div>

    <div class="form-grid">

        <div class="form-group full">
            <label>Senha</label>
            <input type="password"
                   placeholder="Crie uma senha (mínimo de 7 caracteres)">
        </div>

    </div>

    <div class="actions">
        <button class="btn btn-cancelar">
            Cancelar
        </button>

        <button class="btn btn-cadastrar">
            Cadastrar
        </button>
    </div>

</div>

</body>
</html>
